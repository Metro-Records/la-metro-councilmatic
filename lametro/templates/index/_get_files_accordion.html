{% load lametro_extras %}

<div class="accordion w-100" id="accordionAgenda-{{file_format}}-{{ forloop.counter }}">
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#panels-{{file_format}}-{{ forloop.counter }}" aria-expanded="false" aria-controls="panels-{{file_format}}-{{ forloop.counter }}">
        <strong><i class="fa fa-file-text-o me-1" aria-hidden="true"></i>
        Get Agenda {{file_format}}</strong>
      </button>
    </h2>
    <div id="panels-{{file_format}}-{{ forloop.counter }}" class="accordion-collapse collapse">
    <div class="accordion-body p-0">
      <div class="card">
        <ul class="list-group list-group-flush">
          {% if original_pdf_url %}
            <li class="list-group-item"><a href="{{ original_pdf_url }}">Download Agenda (English)</a></li>
          {% endif %}
          {% for file in files|keyvalue:meeting_id %}
            <li class="list-group-item"><a href="{{file.url}}" target="_blank">{{file.link_text}}</a></li>
          {% endfor %}
        </ul>
      </div>
    </div>
    </div>
  </div>
</div>
